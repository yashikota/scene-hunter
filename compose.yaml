services:
  server:
    container_name: server
    environment:
      - TZ=Asia/Tokyo
    build:
      context: server
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8686:8686" # application port
      - "2345:2345" # debugger port
    env_file:
      - .env
    volumes:
      - type: bind
        source: server
        target: /app
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rustfs:
        condition: service_healthy
  postgres:
    image: postgres:18@sha256:9b5bd946f3a507db72c55959700e517463e8d5dbb6f7eb30d920d5bcf6951431
    container_name: postgres
    restart: always
    user: postgres
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql
    environment:
      - POSTGRES_DB=scene-hunter
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Asia/Tokyo
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
  valkey:
    image: valkey/valkey:9.0.3@sha256:2bce660b767cb62c8c0ea020e94a230093be63dbd6af4f21b044960517a5842d
    container_name: valkey
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    volumes:
      - type: volume
        source: valkey-data
        target: /data
    environment:
      - TZ=Asia/Tokyo
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.66@sha256:8bdaa50a5c0bbbddd19ceb45a613141c0e64e692ddd845810f375292f08fe3d2
    container_name: rustfs
    ports:
      - "9000:9000" # application port
      - "9001:9001" # web ui port
    environment:
      - TZ=Asia/Tokyo
      - RUSTFS_SECRET_KEY=${RUSTFS_PASSWORD}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - type: volume
        source: rustfs-data
        target: /data
      - type: volume
        source: rustfs-logs
        target: /logs
  dozzle:
    image: amir20/dozzle:v10.0.5@sha256:b677dd4b37ca35862593eb99fccb44236e726a8741b15e0bf81213d376bdbb73
    container_name: dozzle
    ports:
      - 8080:8080
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
volumes:
  postgres-data:
  valkey-data:
  rustfs-data:
  rustfs-logs:
